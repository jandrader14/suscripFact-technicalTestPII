
services:
  postgres:
    image: postgres:16
    container_name: subscrip-fact_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: subscrip-fact
    ports:
      - "5432:5432"
    volumes:
      - subscrip_fact_data:/var/lib/postgresql/data

volumes:
  subscrip_fact_data: